<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <!-- Safeguard against process.env errors on legacy library loads in browser -->
    <script>
      window.process = {
        env: {
          NODE_ENV: 'development',
          GOOGLE_MAPS_PLATFORM_KEY: ''
        }
      };

      // Suppress cross-origin "Script error." and websocket warnings in sandbox preview iFrame
      window.addEventListener('error', function(event) {
        const msg = event.message || '';
        if (
          msg === 'Script error.' || 
          msg.includes('websocket') || 
          msg.includes('vite') || 
          (event.filename && event.filename.includes('vite'))
        ) {
          event.stopImmediatePropagation();
          event.preventDefault();
          return true;
        }
      }, true);

      window.onerror = function(message, url, line, col, error) {
        const msg = String(message || '');
        if (
          msg === 'Script error.' || 
          msg.includes('websocket') || 
          msg.includes('vite')
        ) {
          return true; // prevent default firing of error to top-level window
        }
        return false;
      };
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
